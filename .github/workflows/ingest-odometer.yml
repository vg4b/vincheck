name: Ingest odometer (ISTP)

# Keeps the odometer cache (vehicle_inspection_odometer) current from the ISTP
# open data. The source publishes each day's file with a ~2–3 week lag (and can
# stall far longer — it went dark 2026-06-06 → mid-July), so a daily run would
# add no freshness while multiplying DB load. Instead we run WEEKLY and resume
# from the newest day we already hold (see "Compute window start"), which absorbs
# a lag of any length. The load is idempotent (download skips existing within a
# run; ingest UPSERTs on cislo_protokolu) and never touches the other cache
# tables.
#
# Required secret: SCALEWAY_ADMIN_DATABASE_URL — the admin connection string
#   (postgres://<admin>:<pw>@<host>:<port>/rdb?sslmode=require). Read+write.

on:
  schedule:
    # Mondays 03:30 UTC — off-peak, after the source's weekly publishes.
    - cron: '30 3 * * 1'
  workflow_dispatch:
    inputs:
      from:
        description: 'Override --from date (YYYY-MM-DD). Default: 35 days ago.'
        required: false

# Never let two ingests overlap on the shared DB node.
concurrency:
  group: ingest-odometer
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # These scripts only need pg + tsx. Install ONLY those: temporarily hide
      # package.json so npm doesn't pull the whole CRA dependency tree (~1600
      # packages) into the runner — just pg + tsx land in ./node_modules, which is
      # where the scripts in scripts/ resolve their imports from.
      - name: Install pg + tsx only
        run: |
          mv package.json _package.json
          npm install --no-save --no-package-lock --no-audit --no-fund pg tsx
          mv _package.json package.json

      # Anchor the window to the DATA, not the wall clock. A fixed "35 days ago"
      # start silently loses days whenever the source stalls longer than the
      # window: it slid past our newest reading during the 2026-06/07 ISTP
      # outage, so a catch-up backfill would have been skipped for good while the
      # job still went green. Instead we resume from the newest day we already
      # hold (cache_meta.source_snapshot — a GREATEST() high-water mark, O(1) to
      # read) minus OVERLAP_DAYS. Re-processing those days is free: the ingest
      # UPSERTs on cislo_protokolu. Empty table / unreachable DB falls back to
      # the old 35-day window.
      - name: Compute window start
        id: win
        env:
          DATABASE_URL: ${{ secrets.SCALEWAY_ADMIN_DATABASE_URL }}
          OVERLAP_DAYS: '7'
        run: |
          FROM="${{ github.event.inputs.from }}"
          if [ -z "$FROM" ]; then
            # Subtract the overlap in Postgres, not in `date` — one round trip,
            # no shell date-string parsing to get wrong.
            FROM=$(psql "$DATABASE_URL" -tAc \
              "SELECT (source_snapshot - MAKE_INTERVAL(days => $OVERLAP_DAYS))::date
                 FROM cache_meta WHERE dataset = 'odometer'" 2>/dev/null | tr -d '[:space:]' || true)
            if [ -n "$FROM" ]; then
              echo "Resuming $OVERLAP_DAYS days before the odometer high-water mark"
            else
              FROM=$(date -u -d '35 days ago' +%F)
              echo "No high-water mark (empty table / DB unreachable) — falling back to a 35-day window"
            fi
          fi
          echo "from=$FROM" >> "$GITHUB_OUTPUT"
          echo "Ingesting from $FROM"

      - name: Crawl catalog
        run: npx tsx scripts/crawl-odometer-catalog.ts --out odometer-data/manifest.json

      - name: Download new files
        run: >
          npx tsx scripts/download-odometer.ts
          --manifest odometer-data/manifest.json
          --dir odometer-data/xml
          --from ${{ steps.win.outputs.from }}
          --concurrency 6

      - name: Ingest into Scaleway
        env:
          DATABASE_URL: ${{ secrets.SCALEWAY_ADMIN_DATABASE_URL }}
        run: >
          npx tsx scripts/ingest-odometer.ts
          --apply-schema
          --dir odometer-data/xml
          --from ${{ steps.win.outputs.from }}
          --throttle 25
